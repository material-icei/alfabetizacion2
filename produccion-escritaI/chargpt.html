<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>El cuento del perrito 🐶</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <header>
    <div class="header-inner">
      <span class="paw">🐾</span>
      <h1>El cuento del perrito</h1>
      <span class="paw">🐾</span>
    </div>
    <p class="subtitle">Mirá las imágenes y escribí tu cuento completo.</p>
  </header>

  <main>

    <!-- 🧑 DATOS -->
    <section class="story-table" style="margin-bottom:20px; padding:15px;">
      <div class="col-write" style="gap:12px;">

        <label class="write-label">Nombre:</label>
        <input id="nombre" class="story-area" type="text" placeholder="Escribí tu nombre...">

        <label class="write-label">Curso:</label>
        <input id="curso" class="story-area" type="text" placeholder="Ej: 2° A">

        <label class="write-label">Título del cuento:</label>
        <input id="titulo" class="story-area" type="text" placeholder="Inventá un título... ✨">

      </div>
    </section>

    <div class="story-table">

      <!-- INICIO -->
      <section class="story-row">
        <div class="col-image">
          <div class="part-badge badge-inicio">1. Inicio</div>
          <div class="image-frame frame-inicio">
            <img src="inicio.png"/>
          </div>
        </div>

        <div class="col-write">
          <label class="write-label">Inicio:</label>
          <textarea id="ta-inicio" class="story-area"></textarea>
        </div>
      </section>

      <!-- CONFLICTO -->
      <section class="story-row">
        <div class="col-image">
          <div class="part-badge badge-conflicto">2. Conflicto</div>
          <div class="image-frame frame-conflicto">
            <img src="conflicto.png"/>
          </div>
        </div>

        <div class="col-write">
          <label class="write-label">Conflicto:</label>
          <textarea id="ta-conflicto" class="story-area"></textarea>
        </div>
      </section>

      <!-- DESENLACE -->
      <section class="story-row">
        <div class="col-image">
          <div class="part-badge badge-desenlace">3. Final</div>
          <div class="image-frame frame-desenlace">
            <img src="desenlace.png"/>
          </div>
        </div>

        <div class="col-write">
          <label class="write-label">Desenlace:</label>
          <textarea id="ta-desenlace" class="story-area"></textarea>
        </div>
      </section>

    </div>

    <!-- BOTONES -->
    <div class="actions-bar">
      <button class="btn btn-clear" onclick="clearAll()">🗑️ Borrar</button>
      <button class="btn btn-print" onclick="enviarCuento()">📤 Enviar</button>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
