<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sopa de Letras 🔤</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<header>
  <div class="header-inner">
    <span class="hdr-emoji">🔤</span>
    <div>
      <h1>Sopa de Letras</h1>
      <p class="subtitle">¡Encontrá las palabras escondidas!</p>
    </div>
    <span class="hdr-emoji" style="animation-delay:.5s">🔍</span>
  </div>
  <div class="puzzle-nav">
    <div class="puzzle-dot active" id="dot-0"></div>
    <div class="puzzle-dot" id="dot-1"></div>
    <div class="puzzle-dot" id="dot-2"></div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <span class="progress-label" id="progress-label">0 / 6</span>
  </div>
</header>

<main>
  <div class="game-layout">
    <div class="grid-panel">
      <div class="category-badge" id="category-badge">🍽️ Alimentos</div>
      <div class="grid-container" id="grid-container"></div>
    </div>
    <div class="words-panel">
      <h3>Buscá estas palabras:</h3>
      <div class="word-list" id="word-list"></div>
    </div>
  </div>
</main>

<div id="modal-level" class="modal hidden">
  <div class="modal-box">
    <div class="modal-emoji">🎉</div>
    <h2 id="modal-title">¡Nivel completado!</h2>
    <p id="modal-msg">Encontraste todas las palabras.</p>
    <button class="btn-next" id="btn-next" onclick="nextPuzzle()">Siguiente sopa ➡️</button>
  </div>
</div>

<div id="modal-final" class="modal hidden">
  <div class="modal-box">
    <div class="modal-emoji">🏆</div>
    <h2>¡Felicitaciones!</h2>
    <p>Completaste las 3 sopas de letras.</p>
    <div class="confetti-row">🎊 🌟 🎊 🌟 🎊</div>
    <button class="btn-next" onclick="restartAll()">🔄 Jugar de nuevo</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
