<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡A Jugar y Aprender!</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&family=Fredoka+One&display=swap"
        rel="stylesheet">
</head>

<body>

    <header>
        <h1>🌟 ¡Mis Juegos de Letras! 🌟</h1>
        <p>Elige una aventura hoy</p>
    </header>

    <main class="menu-container">

        <button class="game-card card-blue" onclick="location.href='armar-palabras/index.html'">
            <span class="icon">🔡</span>
            <span>Armar Palabras<br><small>2 sílabas</small></span>
        </button>

        <button class="game-card card-green" onclick="location.href='armar-palabras3/index.html'">
            <span class="icon">🔤</span>
            <span>Armar Palabras<br><small>3 sílabas</small></span>
        </button>

        <button class="game-card card-orange" onclick="location.href='encontrar-palabra/index.html'">
            <span class="icon">🔍</span>
            <span>Unir palabra imagen</span>
        </button>

        <button class="game-card card-pink" onclick="location.href='rimas/index.html'">
            <span class="icon">🎶</span>
            <span>Qué rima con...</span>
        </button>

        <button class="game-card card-purple" onclick="location.href='rosco/index.html'">
            <span class="icon">💡</span>
            <span>Decí tres cosas</span>
        </button>

        <button class="game-card card-yellow" onclick="location.href='produccion-escritaI/index.html'">
            <span class="icon">✍️</span>
            <span>Producción Escrita 1</span>
        </button>

        <button class="game-card card-pink" onclick="location.href='produccion-escritaII/index.html'">
            <span class="icon">📝</span>
            <span>Producción Escrita 2</span>
        </button>

        <button class="game-card card-green" onclick="location.href='sopa/index.html'">
            <span class="icon">🔎</span>
            <span>Sopa de Letras</span>
        </button>

        <button class="game-card card-yellow" onclick="location.href='orden-alfabetico/index.html'">
            <span class="icon">🔠</span>
            <span>Orden Alfabético</span>
        </button>

        <button class="game-card card-purple" onclick="location.href='ordenar-letras/index.html'">
            <span class="icon">🧩</span>
            <span>Ordenar Letras</span>
        </button>

        <button class="game-card card-orange" onclick="location.href='oracion-imagen/index.html'">
            <span class="icon">🖼️</span>
            <span>Leo y emparejo</span>
        </button>

    </main>

    <script src="script.js"></script>
</body>

</html>
